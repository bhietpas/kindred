spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/kindred
    username: kindred
    password: kindred
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwks-uri: ${CLERK_JWKS_URI:https://placeholder.invalid/.well-known/jwks.json}
  main:
    # Lets nested @TestConfiguration in IT tests register a jwtDecoder bean
    # that overrides the one in SecurityConfig.  HealthCheckIT and SchemaIT
    # have no nested @TestConfiguration, so they simply use the production decoder
    # (which is never actually invoked because their tested endpoints don't require auth).
    allow-bean-definition-overriding: true

management:
  endpoints:
    web:
      exposure:
        include: health
